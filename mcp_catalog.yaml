version: "2.0"

servers:

  # -----------------------------
  # STORAGE (SOURCE OF TRUTH)
  # -----------------------------
  - name: "filesystem"
    mcp_server: "modelcontextprotocol/filesystem"
    description: "Access raw documents from allowed directories."
    inputs:
      path: "string"
    outputs:
      content: "string"
      metadata: "object"
    constraints:
      read_only: true
      allowed_directories_only: true

  # -----------------------------
  # INGESTION / PARSING
  # -----------------------------
  - name: "document_parser"
    mcp_server: "Unstructured-IO/UNS-MCP"
    description: "Parse documents (PDF, DOCX, HTML, etc.) into structured text."
    inputs:
      file_path: "string"
    outputs:
      elements:
        - text: "string"
          metadata: "object"
    constraints:
      deterministic_output: true
      no_external_enrichment: true

  # -----------------------------
  # RETRIEVAL (VelociRAG)
  # -----------------------------
  - name: "retrieval"
    mcp_server: "haseebkhalid1507/velocirag"
    description: "Hybrid retrieval (BM25 + vector + reranking)."
    inputs:
      query: "string"
      top_k: "int"
    outputs:
      results:
        - doc_id: "string"
          text: "string"
          score: "float"
          metadata: "object"
    constraints:
      deterministic_results: true
      fixed_embedding_model: true

  # -----------------------------
  # LLM GENERATION (Ollama Cloud via MCP Bridge)
  # -----------------------------
  - name: "llm_generate"
    mcp_server: "jonigl/ollama-mcp-bridge"
    description: "Generate grounded answers using retrieved context via Ollama Cloud."
    inputs:
      query: "string"
      context: "list[string]"
    outputs:
      answer: "string"
      citations: "list[string]"
    constraints:
      must_use_context_only: true
      no_external_knowledge: true
      cloud_only: true

# -----------------------------
# GLOBAL RULES
# -----------------------------
global_rules:
  architecture: "rag"
  retrieval_mode: "hybrid"
  require_citations: true
  require_grounded_answers: true
  max_chunks: 8
  max_retries: 1
