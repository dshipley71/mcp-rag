version: "1.0"

servers:
  - name: "document_fetch"
    description: "Retrieve full documents or document chunks by ID."
    inputs:
      doc_ids: "list[string]"
      source: "optional string"
    outputs:
      documents:
        - id: "string"
          text: "string"
          metadata: "object"
    constraints:
      raw_content_only: true
      no_external_calls: true
      stable_ordering: true

  - name: "bm25_search"
    description: "Keyword-based lexical search."
    inputs:
      query: "string"
      top_k: "int (default=20)"
    outputs:
      results:
        - doc_id: "string"
          score: "float"
    constraints:
      fixed_top_k: 20
      deterministic_results: true
      no_query_rewrite: true

  - name: "vector_search"
    description: "Semantic search using embeddings."
    inputs:
      query: "string"
      top_k: "int (default=20)"
    outputs:
      results:
        - doc_id: "string"
          score: "float"
    constraints:
      fixed_top_k: 20
      deterministic_results: true
      fixed_embedding_model: true

  - name: "rerank"
    description: "Re-rank candidate documents using a cross-encoder."
    inputs:
      query: "string"
      candidates: "list of {doc_id, text}"
    outputs:
      reranked:
        - doc_id: "string"
          score: "float"
    constraints:
      max_candidates: 30
      deterministic_ordering: true
      no_filtering: true

  - name: "fact_check"
    description: "Validate answer against retrieved evidence."
    inputs:
      answer: "string"
      evidence: "list of {doc_id, text}"
    outputs:
      verdict: "pass | fail"
      confidence: "float"
      issues: "list[string]"
    constraints:
      use_only_provided_evidence: true
      no_external_knowledge: true
      binary_decision: true

global_rules:
  retrieval_mode: "hybrid"
  fusion_method: "rrf"
  max_rerank_candidates: 30
  max_final_chunks: 8
  max_iterations: 2
  allow_query_rewrite: true
  require_citations: true
  require_grounded_answers: true
