version: "1.0"

servers:
  - name: "filesystem"
    mcp_server: "modelcontextprotocol/filesystem"
    description: "Source-of-truth file access for ingestion."
    inputs:
      path: "string"
    outputs:
      content: "string"
    constraints:
      no_external_calls: true
      read_only_for_ingestion: true

  - name: "document_parser"
    mcp_server: "Unstructured-IO/UNS-MCP"
    description: "Parse files into normalized text/elements for indexing."
    inputs:
      path: "string"
    outputs:
      text: "string"
      elements: "optional list[object]"
    constraints:
      deterministic_normalization: true
      fail_closed_on_parse_error: true

  - name: "retrieval"
    mcp_server: "haseebkhalid1507/velocirag"
    description: "Hybrid retrieval backend and index store."
    inputs:
      query: "string"
      top_k: "int"
      content: "string"
    outputs:
      results: "list[object]"
    constraints:
      hybrid_retrieval_always_on: true
      retrieval_backend_locked: true

  - name: "llm_generate"
    mcp_server: "jonigl/ollama-mcp-bridge"
    description: "Cloud-only answer generation through MCP bridge."
    inputs:
      prompt: "string"
      context: "list[object]"
    outputs:
      answer: "string"
    constraints:
      cloud_only: true
      no_local_ollama: true

global_rules:
  retrieval_mode: "hybrid"
  max_retries: 1
  require_citations: true
  require_grounded_answers: true
