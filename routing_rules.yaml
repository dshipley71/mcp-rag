version: "2.0"
profile: "mcp-rag-v2-minimal"

defaults:
  bm25_top_k: 20
  vector_top_k: 20
  max_candidates: 30
  max_final_chunks: 8
  max_retries: 1
  answer_via_bridge: true
  ollama_mode: "cloud_only"

pipeline:
  - "bm25_search"
  - "vector_search"
  - "document_fetch"
  - "rerank"
  - "answer"

rules:
  - name: "always_use_hybrid"
    action:
      use_bm25: true
      use_vector: true

  - name: "answer_via_ollama_bridge"
    action:
      use_bridge_for_answer_generation: true
      use_local_ollama: false

  - name: "retry_if_low_evidence"
    if:
      evidence_low: true
      retries: 0
    then:
      action: "rewrite_query"

constraints:
  must_use_context_only: true
  must_cite_sources: true
  no_hallucination: true
  stop_if_no_evidence: true
